<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Transformer Lab</title>

  <link rel="stylesheet" href="css/simulation.css">
  <link rel="stylesheet" href="css/sumpner.css">
</head>

<body>

<h2 class="title">Virtual Transformer Testing Simulation</h2>

<!-- =========================
        TEST TABS
========================== -->
<div class="tabs">
  <button onclick="loadTest('OC')" class="active">Open Circuit</button>
  <button onclick="loadTest('SC')">Short Circuit</button>
  <button onclick="loadTest('SUMP')">Sumpner’s Test</button>
</div>

<!-- =========================
      DYNAMIC AREA
========================== -->
<div id="simulation-area"></div>

<!-- ============================================================
                      OPEN CIRCUIT TEMPLATE
=============================================================== -->
<template id="oc-template">

  <div id="panel">

    <!-- SUPPLY -->
    <div class="box supply">
      <img src="assets/supply.png" draggable="false">
      <div class="terminal" data-id="A">A</div>
      <div class="terminal" data-id="B">B</div>
    </div>

    <!-- METERS -->
    <div class="box meters">

      <div class="meter" id="oc-voltmeter1">
        <h4>Voltmeter 1</h4>
        <img src="assets/voltmeter.png" draggable="false">
        <div class="terminal" data-id="F">F</div>
        <div class="terminal" data-id="G">G</div>
      </div>

      <div class="meter" id="oc-ammeter">
        <h4>Ammeter</h4>
        <img src="assets/ammeter.png" draggable="false">
        <div class="terminal" data-id="H">H</div>
        <div class="terminal" data-id="I">I</div>
      </div>

      <div class="meter" id="oc-wattmeter">
        <h4>Wattmeter</h4>
        <img src="assets/wattmeter.png" draggable="false">
        <div class="terminal" data-id="M">M</div>
        <div class="terminal" data-id="C">C</div>
        <div class="terminal" data-id="L">L</div>
        <div class="terminal" data-id="V">V</div>
      </div>

    </div>

    <!-- SECONDARY VOLTMETER -->
    <div class="box voltmeter2">
      <h4>Voltmeter 2</h4>
      <img src="assets/voltmeter.png" draggable="false">
      <div class="terminal" data-id="J">J</div>
      <div class="terminal" data-id="K">K</div>
    </div>

    <!-- VARIAC -->
    <div class="box variac">
      <img src="assets/variac.png" draggable="false">
      <div class="terminal" data-id="D">D</div>
      <div class="terminal" data-id="E">E</div>
    </div>

    <!-- TRANSFORMER -->
    <div class="box transformer">
      <img src="assets/transformer.png" draggable="false">

      <!-- Primary -->
      <div class="terminal" data-id="P1">P1</div>
      <div class="terminal" data-id="P2">P2</div>

      <!-- Secondary (Open) -->
      <div class="terminal open" data-id="S1">S1</div>
      <div class="terminal open" data-id="S2">S2</div>
    </div>

    <!-- SVG WIRES -->
    <svg id="wires"></svg>

  </div>

  <!-- CONTROLS -->
  <div class="controls">

    <button onclick="checkConnections()" class="check-btn">Check Connections</button>
    <button onclick="undoConnection()" class="undo-btn">Undo</button>
    <button onclick="resetCircuit()" class="reset-btn">Reset</button>

    <p id="status" class="status-msg"></p>

    <label>Voltage</label>
    <input type="range" id="voltageSlider" min="0" max="230" disabled>
    <span id="voltageValue">0 V</span>

    <p>Voltmeter: <span id="voltmeter">0</span> V</p>
    <p>Ammeter: <span id="ammeter">0</span> A</p>
    <p>Wattmeter: <span id="wattmeter">0</span> W</p>

    <button id="addReadingBtn" onclick="addReading()" disabled>Add Reading</button>
    <button id="submitBtn" onclick="calculateResults()" disabled>Submit</button>

  </div>

  <!-- READINGS TABLE -->
  <table>
    <thead>
      <tr>
        <th>Voltage (V)</th>
        <th>Current (A)</th>
        <th>Power (W)</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div id="results"></div>

</template>

<!-- ============================================================
                      SHORT CIRCUIT TEMPLATE
=============================================================== -->

<template id="sc-template">

  <!-- Same structure as OC, only difference is secondary NOT open -->

  <div id="panel">

    <div class="box supply">
      <img src="assets/supply.png" draggable="false">
      <div class="terminal" data-id="A">A</div>
      <div class="terminal" data-id="B">B</div>
    </div>

    <div class="box meters">

      <div class="meter">
        <h4>Voltmeter 1</h4>
        <img src="assets/voltmeter.png" draggable="false">
        <div class="terminal" data-id="F">F</div>
        <div class="terminal" data-id="G">G</div>
      </div>

      <div class="meter">
        <h4>Ammeter</h4>
        <img src="assets/ammeter.png" draggable="false">
        <div class="terminal" data-id="H">H</div>
        <div class="terminal" data-id="I">I</div>
      </div>

      <div class="meter">
        <h4>Wattmeter</h4>
        <img src="assets/wattmeter.png" draggable="false">
        <div class="terminal" data-id="M">M</div>
        <div class="terminal" data-id="C">C</div>
        <div class="terminal" data-id="L">L</div>
        <div class="terminal" data-id="V">V</div>
      </div>

    </div>

    <div class="box voltmeter2">
      <h4>Voltmeter 2</h4>
      <img src="assets/voltmeter.png" draggable="false">
      <div class="terminal" data-id="J">J</div>
      <div class="terminal" data-id="K">K</div>
    </div>

    <div class="box variac">
      <img src="assets/variac.png" draggable="false">
      <div class="terminal" data-id="D">D</div>
      <div class="terminal" data-id="E">E</div>
    </div>

    <div class="box transformer">
      <img src="assets/transformer.png" draggable="false">
      <div class="terminal" data-id="P1">P1</div>
      <div class="terminal" data-id="P2">P2</div>
      <div class="terminal" data-id="S1">S1</div>
      <div class="terminal" data-id="S2">S2</div>
    </div>

    <svg id="wires"></svg>

  </div>

  <!-- Controls + table identical to OC -->

</template>

<!-- =========================
         SCRIPTS
========================== -->
<script src="js/config.js"></script>
<script src="js/circuit.js"></script>
<script src="js/calculations.js"></script>

<script src="js/sumpner/sumpner.config.js"></script>
<script src="js/sumpner/sumpner.circuit.js"></script>
<script src="js/sumpner/sumpner.calc.js"></script>
<script src="js/sumpner/sumpner.ui.js"></script>

<script src="js/simulation.js"></script>

</body>
</html>
