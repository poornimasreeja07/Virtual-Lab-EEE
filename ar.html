<!DOCTYPE html>
<html>
<head>
  <title>AR Integrated Transformer Lab</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }
    #simPanel {
      position:fixed;
      bottom:0;
      width:100%;
      height:45%;
      background:white;
      overflow:auto;
      border-top:3px solid black;
    }
    #title {
      position:fixed;
      top:0;
      width:100%;
      background:black;
      color:white;
      text-align:center;
      padding:5px;
      font-weight:bold;
      z-index:999;
    }
  </style>
</head>

<body>

<div id="title">
AR Based Open Circuit Transformer Test
</div>

<!-- AR Scene -->
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-marker preset="hiro">

    <!-- Transformer Model -->
    <a-box position="0 0.5 0"
           scale="1 1 1"
           color="blue">
    </a-box>

    <a-text value="Single Phase Transformer"
            position="-1 1.5 0"
            color="black"
            scale="1 1 1">
    </a-text>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<!-- Your Existing Simulation -->
<div id="simPanel">
  <iframe src="simulation.html"
          width="100%"
          height="100%"
          style="border:none;">
  </iframe>
</div>

</body>
</html>
